name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 'stable'

    - name: Run unit tests
      run: go test ./...

    - name: Build binaries
      run: |
        mkdir -p dist
        GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/squidgame-linux-amd64   ./cmd/squidgame/
        GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/squidgame-linux-arm64   ./cmd/squidgame/
        GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/squidgame-darwin-amd64  ./cmd/squidgame/
        GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/squidgame-darwin-arm64  ./cmd/squidgame/
        GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/squidgame-windows-amd64.exe ./cmd/squidgame/

    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: dist/*
