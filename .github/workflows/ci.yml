name: Squidgame CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.0' # Matches the project version

    - name: Build Squidgame
      run: go build -v -o squidgame ./cmd/squidgame/main.go

    - name: Run Bootstrap (Install Solver)
      run: bash bootstrap.sh

    - name: Verify Dependencies
      run: ./bin/highs --version

    - name: Run All Tests
      run: ./squidgame tests/
